<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./login.css" />
    <title>test7-login</title>
  </head>
  <body>
    <div class="container">
      <div class="login">
        <h1>LOGIN</h1>
        <form action="">
          <div class="login-form">
            <div class="id-form">
              <label for="user-id">ID</label>
              <input type="email" id="user-id" placeholder="email" required />
            </div>

            <div class="pw-form">
              <label for="user-pw">PW</label>
              <input
                type="password"
                id="user-pw"
                placeholder="password"
                required
              />
            </div>
            <button type="submit" class="login-btn">LOGIN</button>
          </div>
        </form>
        <a href="../signup/signup.html" class="signup">회원가입</a>
      </div>
    </div>
  </body>
</html>
